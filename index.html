<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-HAM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0b;
            --bg-secondary: #111113;
            --bg-tertiary: #1a1a1d;
            --bg-hover: #222225;
            --bg-active: #2a2a2f;
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --border-color: #27272a;
            --accent: #10a37f;
            --accent-hover: #0d8a6a;
            --user-msg-bg: #10a37f;
            --user-msg-bg-hover: #0d8a6a;
            --sidebar-width: 260px;
            --header-height: 56px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .app {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            height: 100vh;
        }

        .sidebar-top {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .new-chat-btn {
            width: 100%;
            padding: 12px 16px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .new-chat-btn:hover {
            background: var(--bg-hover);
            border-color: var(--text-muted);
        }

        .new-chat-btn svg {
            width: 16px;
            height: 16px;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .chat-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .chat-item {
            padding: 10px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: all 0.1s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .chat-item.active {
            background: var(--bg-active);
            color: var(--text-primary);
        }

        .chat-item-icon {
            flex-shrink: 0;
            font-size: 14px;
        }

        .sidebar-footer {
            padding: 12px;
            border-top: 1px solid var(--border-color);
        }

        .sidebar-footer-content {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.1s ease;
        }

        .sidebar-footer-content:hover {
            background: var(--bg-hover);
        }

        .sidebar-avatar {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #10a37f 0%, #0d8a6a 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .sidebar-user-info {
            flex: 1;
            min-width: 0;
        }

        .sidebar-user-name {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .sidebar-user-status {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* Main Content */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            height: 100vh;
        }

        .chat-header {
            height: var(--header-height);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-primary);
            flex-shrink: 0;
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .menu-btn {
            display: none;
            width: 36px;
            height: 36px;
            background: transparent;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            transition: background 0.1s ease;
        }

        .menu-btn:hover {
            background: var(--bg-hover);
        }

        .menu-btn svg {
            width: 20px;
            height: 20px;
            stroke: var(--text-primary);
        }

        .chat-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .chat-header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .model-selector {
            padding: 6px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.1s ease;
            min-width: 140px;
        }

        .model-selector:hover {
            background: var(--bg-hover);
        }

        /* Loading Spinner */
        .loading-indicator {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--accent);
            font-size: 12px;
            font-weight: 500;
        }

        .loading-indicator.active {
            display: flex;
        }

        .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid var(--border-color);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Messages Area */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }

        .messages {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 20px 100px;
        }

        .message {
            display: flex;
            gap: 16px;
            padding: 16px 0;
            animation: messageIn 0.2s ease;
        }

        @keyframes messageIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 16px;
        }

        .message.user .message-avatar {
            background: var(--accent);
        }

        .message.ai .message-avatar {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
        }

        .message-content {
            flex: 1;
            min-width: 0;
            padding-top: 4px;
        }

        .message-user-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .message-text {
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-primary);
        }

        .message-text p {
            margin-bottom: 8px;
        }

        .message-text p:last-child {
            margin-bottom: 0;
        }

        .message-text strong {
            font-weight: 600;
            color: var(--text-primary);
        }

        .message-text em {
            font-style: italic;
        }

        .message-text code {
            background: var(--bg-tertiary);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 13px;
            color: #f472b6;
        }

        .message-text pre {
            background: #1e1e1e;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            margin: 12px 0;
            overflow-x: auto;
        }

        .message-text pre code {
            background: transparent;
            padding: 0;
            color: #d4d4d4;
            font-size: 13px;
            line-height: 1.5;
        }

        .message-text ul, .message-text ol {
            margin: 8px 0;
            padding-left: 24px;
        }

        .message-text li {
            margin: 4px 0;
        }

        .message-text blockquote {
            border-left: 3px solid var(--accent);
            padding-left: 12px;
            margin: 8px 0;
            color: var(--text-secondary);
        }

        .message-text a {
            color: var(--accent);
            text-decoration: none;
        }

        .message-text a:hover {
            text-decoration: underline;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message.user .message-content {
            text-align: right;
        }

        .message-image {
            max-width: 400px;
            max-height: 300px;
            border-radius: 12px;
            margin-top: 8px;
            cursor: pointer;
            transition: opacity 0.15s ease;
        }

        .message-image:hover {
            opacity: 0.9;
        }

        /* Welcome Screen */
        .welcome {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
        }

        .welcome-icon {
            font-size: 56px;
            margin-bottom: 20px;
            opacity: 0.9;
        }

        .welcome h2 {
            font-size: 26px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .welcome p {
            font-size: 14px;
            color: var(--text-secondary);
            max-width: 400px;
            line-height: 1.5;
        }

        /* Input Area */
        .input-area {
            position: fixed;
            bottom: 0;
            left: var(--sidebar-width);
            right: 0;
            padding: 16px 20px 24px;
            background: linear-gradient(to top, var(--bg-primary) 80%, transparent);
        }

        .input-container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
        }

        .input-wrapper {
            display: flex;
            align-items: flex-end;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 8px 8px 8px 16px;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(16, 163, 127, 0.1);
        }

        .input-tools {
            display: flex;
            gap: 4px;
            padding-bottom: 4px;
        }

        .tool-btn {
            width: 32px;
            height: 32px;
            background: transparent;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.1s ease;
        }

        .tool-btn:hover {
            background: var(--bg-hover);
        }

        .tool-btn svg {
            width: 18px;
            height: 18px;
            stroke: var(--text-muted);
        }

        .tool-btn.active {
            background: var(--bg-active);
        }

        .tool-btn.active svg {
            stroke: var(--accent);
        }

        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            resize: none;
            outline: none;
            max-height: 150px;
            min-height: 24px;
            line-height: 24px;
            padding: 4px 0;
        }

        .chat-input::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            width: 36px;
            height: 36px;
            background: var(--accent);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            flex-shrink: 0;
        }

        .send-btn:hover {
            background: var(--accent-hover);
            transform: scale(1.02);
        }

        .send-btn:disabled {
            background: var(--bg-tertiary);
            cursor: not-allowed;
            transform: none;
        }

        .send-btn svg {
            width: 18px;
            height: 18px;
            fill: white;
        }

        /* Image Preview */
        .image-preview-container {
            display: none;
            padding: 8px 16px 0;
            max-width: 800px;
            margin: 0 auto;
        }

        .image-preview-container.active {
            display: block;
        }

        .image-preview {
            position: relative;
            display: inline-block;
        }

        .image-preview img {
            max-width: 200px;
            max-height: 150px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .image-remove {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 24px;
            height: 24px;
            background: #ef4444;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: white;
            transition: transform 0.1s ease;
        }

        .image-remove:hover {
            transform: scale(1.1);
        }

        /* Model Loading */
        .model-loading {
            font-size: 11px;
            color: var(--text-muted);
            padding: 4px 0;
        }

        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }

        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-4px); opacity: 1; }
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -100%;
                top: 0;
                height: 100vh;
                z-index: 100;
                transition: left 0.25s ease;
                width: 280px;
            }

            .sidebar.open {
                left: 0;
            }

            .sidebar-overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.5);
                z-index: 99;
                display: none;
            }

            .sidebar-overlay.open {
                display: block;
            }

            .menu-btn {
                display: flex;
            }

            .input-area {
                left: 0;
                padding: 12px 16px 20px;
            }

            .messages {
                padding: 16px 16px 120px;
            }

            .message {
                gap: 12px;
                padding: 12px 0;
            }

            .message-avatar {
                width: 28px;
                height: 28px;
                font-size: 14px;
            }

            .message-text {
                font-size: 14px;
            }

            .welcome h2 {
                font-size: 22px;
            }

            .welcome-icon {
                font-size: 48px;
            }

            .model-selector {
                min-width: 100px;
                font-size: 11px;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* Image Modal */
        .image-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 200;
            align-items: center;
            justify-content: center;
            cursor: zoom-out;
        }

        .image-modal.active {
            display: flex;
        }

        .image-modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-top">
                <button class="new-chat-btn" id="newChatBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    New Chat
                </button>
            </div>
            
            <div class="sidebar-content">
                <div class="chat-list" id="chatList"></div>
            </div>
            
            <div class="sidebar-footer">
                <div class="sidebar-footer-content">
                    <div class="sidebar-avatar">👾</div>
                    <div class="sidebar-user-info">
                        <div class="sidebar-user-name">AI-HAM</div>
                        <div class="sidebar-user-status">Online</div>
                    </div>
                </div>
            </div>
        </aside>
        
        <main class="main">
            <header class="chat-header">
                <div class="chat-header-left">
                    <button class="menu-btn" id="menuBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="3" y1="12" x2="21" y2="12"></line>
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <line x1="3" y1="18" x2="21" y2="18"></line>
                        </svg>
                    </button>
                    <h1 class="chat-title" id="chatTitle">New Chat</h1>
                </div>
                <div class="chat-header-right">
                    <div class="loading-indicator" id="loadingIndicator">
                        <div class="spinner"></div>
                        <span>Thinking...</span>
                    </div>
                    <select class="model-selector" id="modelSelector">
                        <option value="">Loading models...</option>
                    </select>
                </div>
            </header>
            
            <div class="messages-container">
                <div class="messages" id="messages">
                    <div class="welcome">
                        <div class="welcome-icon">👾</div>
                        <h2>Welcome to AI-HAM</h2>
                        <p>Ask me anything — text or image. Switch models anytime.</p>
                    </div>
                </div>
            </div>

            <div class="image-preview-container" id="imagePreviewContainer">
                <div class="image-preview">
                    <img id="imagePreview" src="" alt="Preview">
                    <button class="image-remove" id="imageRemove">×</button>
                </div>
            </div>
            
            <div class="input-area">
                <div class="input-container">
                    <div class="input-wrapper">
                        <div class="input-tools">
                            <button class="tool-btn" id="uploadBtn" title="Upload Image">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                    <polyline points="21 15 16 10 5 21"></polyline>
                                </svg>
                            </button>
                        </div>
                        <textarea 
                            class="chat-input" 
                            id="chatInput" 
                            placeholder="Message AI-HAM..."
                            rows="1"
                        ></textarea>
                        <button class="send-btn" id="sendBtn" disabled>
                            <svg viewBox="0 0 24 24">
                                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Image Modal -->
    <div class="image-modal" id="imageModal">
        <img id="modalImage" src="" alt="Full size">
    </div>

    <!-- Hidden file input -->
    <input type="file" id="fileInput" accept="image/*" style="display: none;">

    <!-- INJECT_CONFIG -->
    <script>
        const API_BASE = '/v1';
        
        // State
        let conversations = [];
        let currentConversationId = null;
        let isStreaming = false;
        let availableModels = [];
        let selectedModel = 'openclaw/default';
        let attachedImage = null;
        
        // Elements
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        const menuBtn = document.getElementById('menuBtn');
        const newChatBtn = document.getElementById('newChatBtn');
        const chatList = document.getElementById('chatList');
        const messages = document.getElementById('messages');
        const chatTitle = document.getElementById('chatTitle');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const modelSelector = document.getElementById('modelSelector');
        const uploadBtn = document.getElementById('uploadBtn');
        const fileInput = document.getElementById('fileInput');
        const imagePreviewContainer = document.getElementById('imagePreviewContainer');
        const imagePreview = document.getElementById('imagePreview');
        const imageRemove = document.getElementById('imageRemove');
        const imageModal = document.getElementById('imageModal');
        const modalImage = document.getElementById('modalImage');
        
        // Model list with display names and actual model IDs for x-openclaw-model header
        const MODELS = [
            { id: 'minimax/MiniMax-M2.7', display: 'MiniMax M2.7' },
            { id: 'minimax/MiniMax-M2.5', display: 'MiniMax M2.5' },
            { id: 'google-gemini-cli/gemini-3-flash-preview', display: 'Gemini 3 Flash' },
            { id: 'google-gemini-cli/gemini-2.5-flash', display: 'Gemini 2.5 Flash' },
            { id: 'google-gemini-cli/gemini-3.1-pro-preview', display: 'Gemini 3.1 Pro' },
        ];
        
        let selectedModelId = 'minimax/MiniMax-M2.7';
        
        // Load models dropdown
        function loadModels() {
            modelSelector.innerHTML = MODELS.map(m => 
                `<option value="${m.id}">${m.display}</option>`
            ).join('');
            modelSelector.value = selectedModelId;
        }
        
        modelSelector.addEventListener('change', () => {
            selectedModelId = modelSelector.value;
        });
        
        modelSelector.addEventListener('change', () => {
            selectedModel = modelSelector.value;
        });
        
        // Mobile menu toggle
        menuBtn.addEventListener('click', () => {
            sidebar.classList.toggle('open');
            sidebarOverlay.classList.toggle('open');
        });
        
        sidebarOverlay.addEventListener('click', () => {
            sidebar.classList.remove('open');
            sidebarOverlay.classList.remove('open');
        });
        
        // Auto-resize textarea
        chatInput.addEventListener('input', () => {
            chatInput.style.height = 'auto';
            chatInput.style.height = Math.min(chatInput.scrollHeight, 150) + 'px';
            updateSendButton();
        });
        
        function updateSendButton() {
            const hasContent = chatInput.value.trim() || attachedImage;
            sendBtn.disabled = !hasContent || isStreaming;
        }
        
        // Send message
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (!sendBtn.disabled && !isStreaming) {
                    sendMessage();
                }
            }
        });
        
        sendBtn.addEventListener('click', () => {
            if (!sendBtn.disabled && !isStreaming) {
                sendMessage();
            }
        });
        
        // Image upload
        uploadBtn.addEventListener('click', () => {
            fileInput.click();
        });
        
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    attachedImage = e.target.result;
                    imagePreview.src = attachedImage;
                    imagePreviewContainer.classList.add('active');
                    uploadBtn.classList.add('active');
                    updateSendButton();
                };
                reader.readAsDataURL(file);
            }
            fileInput.value = '';
        });
        
        imageRemove.addEventListener('click', () => {
            attachedImage = null;
            imagePreview.src = '';
            imagePreviewContainer.classList.remove('active');
            uploadBtn.classList.remove('active');
            updateSendButton();
        });
        
        // Image modal
        messages.addEventListener('click', (e) => {
            if (e.target.classList.contains('message-image')) {
                modalImage.src = e.target.src;
                imageModal.classList.add('active');
            }
        });
        
        imageModal.addEventListener('click', () => {
            imageModal.classList.remove('active');
        });
        
        // New chat
        newChatBtn.addEventListener('click', () => {
            createNewConversation();
        });
        
        function createNewConversation() {
            const id = Date.now().toString();
            const conv = {
                id,
                title: 'New Chat',
                messages: [],
                createdAt: new Date().toISOString()
            };
            conversations.unshift(conv);
            currentConversationId = id;
            attachedImage = null;
            imagePreview.src = '';
            imagePreviewContainer.classList.remove('active');
            uploadBtn.classList.remove('active');
            renderChatList();
            renderMessages();
            chatTitle.textContent = 'New Chat';
            chatInput.focus();
            closeSidebar();
        }
        
        function closeSidebar() {
            if (window.innerWidth <= 768) {
                sidebar.classList.remove('open');
                sidebarOverlay.classList.remove('open');
            }
        }
        
        function renderChatList() {
            chatList.innerHTML = conversations.map((conv, index) => `
                <div class="chat-item ${conv.id === currentConversationId ? 'active' : ''}" data-id="${conv.id}">
                    <span class="chat-item-icon">💬</span>
                    <span>${escapeHtml(conv.title)}</span>
                </div>
            `).join('');
            
            chatList.querySelectorAll('.chat-item').forEach(item => {
                item.addEventListener('click', () => {
                    currentConversationId = item.dataset.id;
                    const conv = conversations.find(c => c.id === currentConversationId);
                    chatTitle.textContent = conv?.title || 'New Chat';
                    attachedImage = null;
                    imagePreview.src = '';
                    imagePreviewContainer.classList.remove('active');
                    uploadBtn.classList.remove('active');
                    renderChatList();
                    renderMessages();
                    closeSidebar();
                });
            });
        }
        
        function renderMessages() {
            const conv = conversations.find(c => c.id === currentConversationId);
            
            if (!conv || conv.messages.length === 0) {
                messages.innerHTML = `
                    <div class="welcome">
                        <div class="welcome-icon">👾</div>
                        <h2>Welcome to AI-HAM</h2>
                        <p>Ask me anything — text or image. Switch models anytime.</p>
                    </div>
                `;
                return;
            }
            
            messages.innerHTML = conv.messages.map(msg => {
                let imageHtml = '';
                if (msg.image) {
                    imageHtml = `<img class="message-image" src="${msg.image}" alt="Uploaded image">`;
                }
                // AI messages get markdown rendering, user messages get escaped
                const contentHtml = msg.role === 'ai' || msg.role === 'assistant' 
                    ? renderMarkdown(msg.content) 
                    : escapeHtml(msg.content).replace(/\n/g, '<br>');
                return `
                    <div class="message ${msg.role}">
                        <div class="message-avatar">${msg.role === 'user' ? '👤' : '👾'}</div>
                        <div class="message-content">
                            ${msg.role === 'user' ? '<div class="message-user-name">You</div>' : '<div class="message-user-name">AI-HAM</div>'}
                            <div class="message-text">${contentHtml}</div>
                            ${imageHtml}
                        </div>
                    </div>
                `;
            }).join('');
            
            messages.parentElement.scrollTop = messages.parentElement.scrollHeight;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Simple markdown parser
        function renderMarkdown(text) {
            if (!text) return '';
            
            // Escape HTML first for security
            let html = escapeHtml(text);
            
            // Code blocks (must be before inline code)
            html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (match, lang, code) => {
                return `<pre><code class="language-${lang}">${code.trim()}</code></pre>`;
            });
            
            // Inline code
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
            
            // Bold
            html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            
            // Italic
            html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
            
            // Blockquote
            html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
            
            // Unordered lists
            html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
            html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
            
            // Ordered lists
            html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
            
            // Links
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
            
            // Paragraphs (double line breaks)
            html = html.replace(/\n\n/g, '</p><p>');
            html = '<p>' + html + '</p>';
            
            // Single line breaks within paragraphs
            html = html.replace(/\n/g, '<br>');
            
            // Clean up empty paragraphs
            html = html.replace(/<p><\/p>/g, '');
            html = html.replace(/<p>(<pre>)/g, '$1');
            html = html.replace(/(<\/pre>)<\/p>/g, '$1');
            html = html.replace(/<p>(<ul>)/g, '$1');
            html = html.replace(/(<\/ul>)<\/p>/g, '$1');
            html = html.replace(/<p>(<blockquote>)/g, '$1');
            html = html.replace(/(<\/blockquote>)<\/p>/g, '$1');
            
            return html;
        }
        
        async function sendMessage() {
            const content = chatInput.value.trim();
            if ((!content && !attachedImage) || isStreaming) return;
            
            if (!currentConversationId) {
                createNewConversation();
            }
            
            const conv = conversations.find(c => c.id === currentConversationId);
            if (!conv) return;
            
            const userMessage = {
                role: 'user',
                content: content || '[Image]',
                image: attachedImage || null
            };
            conv.messages.push(userMessage);
            
            if (conv.messages.length === 1) {
                conv.title = (content || 'Image').slice(0, 35) + ((content || 'Image').length > 35 ? '...' : '');
                chatTitle.textContent = conv.title;
                renderChatList();
            }
            
            chatInput.value = '';
            chatInput.style.height = 'auto';
            
            // Clear image
            const sentImage = attachedImage;
            attachedImage = null;
            imagePreview.src = '';
            imagePreviewContainer.classList.remove('active');
            uploadBtn.classList.remove('active');
            
            updateSendButton();
            renderMessages();
            
            isStreaming = true;
            document.getElementById('loadingIndicator').classList.add('active');
            
            // Show typing
            messages.innerHTML += `
                <div class="message ai" id="typingMessage">
                    <div class="message-avatar">👾</div>
                    <div class="message-content">
                        <div class="message-user-name">AI-HAM</div>
                        <div class="typing-indicator">
                            <span></span><span></span><span></span>
                        </div>
                    </div>
                </div>
            `;
            messages.parentElement.scrollTop = messages.parentElement.scrollHeight;
            
            try {
                // Build messages for API
                const apiMessages = conv.messages.map(m => {
                    if (m.image) {
                        return {
                            role: m.role,
                            content: [
                                { type: 'text', text: m.content },
                                { type: 'image_url', image_url: { url: m.image } }
                            ]
                        };
                    }
                    return { role: m.role, content: m.content };
                });
                
                const response = await fetch(`${API_BASE}/chat/completions`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${window.API_TOKEN || ''}`,
                        'x-openclaw-model': selectedModelId
                    },
                    body: JSON.stringify({
                        model: 'openclaw/default',
                        messages: apiMessages,
                        stream: true
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`API error: ${response.status}`);
                }
                
                const typingMsg = document.getElementById('typingMessage');
                if (typingMsg) typingMsg.remove();
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let aiContent = '';
                
                const aiMsgEl = document.createElement('div');
                aiMsgEl.className = 'message ai';
                aiMsgEl.innerHTML = `
                    <div class="message-avatar">👾</div>
                    <div class="message-content">
                        <div class="message-user-name">AI-HAM</div>
                        <div class="message-text"></div>
                    </div>
                `;
                messages.appendChild(aiMsgEl);
                const contentEl = aiMsgEl.querySelector('.message-text');
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data === '[DONE]') continue;
                            
                            try {
                                const json = JSON.parse(data);
                                const delta = json.choices?.[0]?.delta?.content;
                                if (delta) {
                                    aiContent += delta;
                                    contentEl.innerHTML = renderMarkdown(aiContent);
                                    messages.parentElement.scrollTop = messages.parentElement.scrollHeight;
                                }
                            } catch (e) {}
                        }
                    }
                }
                
                conv.messages.push({ role: 'assistant', content: aiContent });
                
            } catch (error) {
                console.error('Error:', error);
                isStreaming = false;
                document.getElementById('loadingIndicator').classList.remove('active');
                
                const typingMsg = document.getElementById('typingMessage');
                if (typingMsg) typingMsg.remove();
                
                const aiMsgEl = document.createElement('div');
                aiMsgEl.className = 'message ai';
                aiMsgEl.innerHTML = `
                    <div class="message-avatar">👾</div>
                    <div class="message-content">
                        <div class="message-user-name">AI-HAM</div>
                        <div class="message-text">Sorry, I encountered an error. Please try again.</div>
                    </div>
                `;
                messages.appendChild(aiMsgEl);
                messages.parentElement.scrollTop = messages.parentElement.scrollHeight;
            }
            
            isStreaming = false;
            document.getElementById('loadingIndicator').classList.remove('active');
            updateSendButton();
            saveConversations();
        }
        
        function saveConversations() {
            localStorage.setItem('aiham_conversations', JSON.stringify(conversations));
        }
        
        function loadConversations() {
            try {
                const saved = localStorage.getItem('aiham_conversations');
                if (saved) {
                    conversations = JSON.parse(saved);
                    if (conversations.length > 0) {
                        currentConversationId = conversations[0].id;
                        chatTitle.textContent = conversations[0].title;
                    }
                }
            } catch (e) {}
        }
        
        // Init
        loadModels();
        loadConversations();
        if (conversations.length === 0) {
            createNewConversation();
        } else {
            renderChatList();
            renderMessages();
        }
        updateSendButton();
    </script>
</body>
</html>
